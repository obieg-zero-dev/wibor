name: Update WIBOR rates

on:
  schedule:
    - cron: '0 23 * * 1-5' # pon-pt 23:00 UTC (GPW Benchmark aktualizuje o 23:00)
  workflow_dispatch: # ręczne uruchomienie

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch WIBOR from GPW Benchmark
        run: bash fetch.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --cached --quiet || git commit -m "Update WIBOR rates $(date +%Y-%m-%d)"
          git push
